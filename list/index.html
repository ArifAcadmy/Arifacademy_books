<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Books List • Arif Academy</title>
  <meta name="description" content="View the complete list of available books in the Arif Academy library." />
  <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body class="page-shell" data-theme="light">
  <div class="page-shell__layout">
    <header class="hero-panel hero-panel--small">
      <div>
        <div class="hero-panel__info">
          <div style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem;">
            <img src="../assets/logo.jpg" alt="Arif Academy Logo" style="width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); box-shadow: var(--shadow-sm);" />
            <p class="eyebrow" style="margin: 0;">Arif Academy</p>
          </div>
          <h1>Book Directory</h1>
          <p class="hero-copy">Full index of all available Cambridge IELTS study materials and practice books.</p>
        </div>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">Dark</button>
      </div>
    </header>

    <main class="container">
      <div id="ad-banner-container" style="display: flex; justify-content: center; margin-bottom: 2rem; min-height: 60px; overflow: hidden; border-radius: 8px;"></div>
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="../Index.html">Home</a>
        <span aria-hidden="true">/</span>
        <span>List</span>
      </nav>

      <section class="book-card" style="box-shadow: var(--shadow-md);">
        <h2 style="font-size: 1.35rem; font-weight: 800; margin-bottom: 1.5rem; letter-spacing: -0.01em;">All Available Books</h2>
        <ul id="bookListContainer" style="list-style: none; display: flex; flex-direction: column; gap: 0.75rem;">
          <!-- List elements will be populated dynamically -->
        </ul>
      </section>
    </main>

    <footer class="site-footer">
      <p>Arif Academy • Comprehensive Practice Materials Library</p>
    </footer>
  </div>

  <script type="module">
    import { registerServiceWorker } from '../assets/js/pwa.js';

    const listContainer = document.getElementById('bookListContainer');
    const themeToggle = document.getElementById('themeToggle');
    let activeTheme = localStorage.getItem('theme') || 'light';

    function setTheme(theme) {
      document.body.dataset.theme = theme;
      themeToggle.textContent = theme === 'dark' ? 'Light' : 'Dark';
      localStorage.setItem('theme', theme);
    }

    setTheme(activeTheme);
    themeToggle.addEventListener('click', () => {
      activeTheme = activeTheme === 'dark' ? 'light' : 'dark';
      setTheme(activeTheme);
    });

    async function loadList() {
      try {
        const response = await fetch('../data/book.json');
        if (!response.ok) throw new Error('Books data not found');
        const books = await response.json();
        
        listContainer.innerHTML = Object.entries(books).map(([key, book]) => `
          <li style="border: 1px solid var(--border); padding: 0.85rem 1rem; border-radius: 12px; background: var(--surface-strong); display: flex; justify-content: space-between; align-items: center; transition: var(--transition);">
            <div style="display: flex; flex-direction: column; gap: 0.2rem; text-align: left;">
              <span style="font-weight: 800; font-size: 1rem; color: var(--text);">${book.title}</span>
              <span style="font-size: 0.8rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.02em;">${book.category || 'IELTS'}</span>
            </div>
            <a href="../cambridge-ielts/?book=${encodeURIComponent(key)}" class="button button-primary" style="padding: 0.5rem 1rem; font-size: 0.8rem; border-radius: 8px; font-weight: 700;">Open Book</a>
          </li>
        `).join('');
      } catch (error) {
        console.error(error);
        listContainer.innerHTML = '<li style="color: var(--text-muted);">Failed to load book directory.</li>';
      }
    }

    loadList();
    registerServiceWorker();
  </script>
  <script type="module" src="../assets/js/ads.js"></script>
</body>
</html>
